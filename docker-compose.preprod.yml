services:
  aily-app:
    environment:
      HOSTED_MODE: "true"
      UI_AUTH_ENABLED: "true"
      AILY_DIKIWI_ENABLED: ${AILY_DOCKER_DIKIWI_ENABLED:-false}
      AILY_INNOVATION_ENABLED: ${AILY_DOCKER_INNOVATION_ENABLED:-false}
      AILY_ENTREPRENEUR_ENABLED: ${AILY_DOCKER_ENTREPRENEUR_ENABLED:-false}
      AILY_MAC_ENABLED: ${AILY_DOCKER_MAC_ENABLED:-false}
    labels:
      aily.environment: preprod

  # Placeholder profile for future heavyweight document extraction.
  # The app image already contains the lightweight PDF/Office extraction stack.
  # Enable a dedicated MinerU sidecar only after its runtime contract is stable.
  mineru:
    image: ${AILY_MINERU_IMAGE:-opendatalab/magic-pdf:latest}
    profiles: ["mineru"]
    command: ["sleep", "infinity"]
    volumes:
      - ${AILY_DOCKER_CHAOS_DIR:-/tmp/aily-docker-data/chaos}:/chaos
      - ${AILY_DOCKER_VAULT_DIR:-/tmp/aily-docker-data/vault}:/vault
