[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: fast isolated tests for pure logic and small units
    contract: boundary tests that exercise real local components with fake external services
    integration: multi-component tests, usually local services or durable stores
    e2e: end-to-end product-flow tests
    real_service: tests that hit external production services or require credentials
    acceptance: production-readiness evidence tests with explicit real/fake boundary declarations
    security: security regression tests and threat-model invariants
    slow: real-service or long-running tests that are not part of the fast default regression gate
addopts =
    --strict-markers
