services:
  aily-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${AILY_DOCKER_IMAGE:-aily:preprod}
    ports:
      - "${AILY_HOST_PORT:-8000}:8000"
    environment:
      AILY_DATA_DIR: /data
      OBSIDIAN_VAULT_PATH: /vault
      DIKIWI_VAULT_PATH: /vault
      EVIDENCE_RUNS_DIR: /data/logs/runs
      HOSTED_MODE: ${AILY_DOCKER_HOSTED_MODE:-true}
      UI_AUTH_ENABLED: ${AILY_DOCKER_UI_AUTH_ENABLED:-true}
      UI_AUTH_TOKEN: ${AILY_DOCKER_UI_AUTH_TOKEN:?Set AILY_DOCKER_UI_AUTH_TOKEN to a strong random token}
      UI_RATE_LIMIT_REQUESTS: ${AILY_DOCKER_UI_RATE_LIMIT_REQUESTS:-200}
      UI_RATE_LIMIT_WINDOW_SECONDS: ${AILY_DOCKER_UI_RATE_LIMIT_WINDOW_SECONDS:-60}
      UI_MAX_UPLOAD_FILES: ${AILY_DOCKER_UI_MAX_UPLOAD_FILES:-8}
      UI_MAX_ACTIVE_UPLOADS: ${AILY_DOCKER_UI_MAX_ACTIVE_UPLOADS:-16}
      UI_UPLOAD_CONCURRENCY: ${AILY_DOCKER_UI_UPLOAD_CONCURRENCY:-2}
      URL_INTAKE_ALLOW_PRIVATE_NETWORK: ${AILY_DOCKER_URL_INTAKE_ALLOW_PRIVATE_NETWORK:-false}
      AILY_DIKIWI_ENABLED: ${AILY_DOCKER_DIKIWI_ENABLED:-false}
      AILY_INNOVATION_ENABLED: ${AILY_DOCKER_INNOVATION_ENABLED:-false}
      AILY_ENTREPRENEUR_ENABLED: ${AILY_DOCKER_ENTREPRENEUR_ENABLED:-false}
      AILY_MAC_ENABLED: ${AILY_DOCKER_MAC_ENABLED:-false}
      LLM_PROVIDER: ${AILY_DOCKER_LLM_PROVIDER:-kimi}
      LLM_API_KEY: ${AILY_DOCKER_LLM_API_KEY:-}
      KIMI_API_KEY: ${AILY_DOCKER_KIMI_API_KEY:-}
      DEEPSEEK_API_KEY: ${AILY_DOCKER_DEEPSEEK_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${AILY_DOCKER_LLM_TIMEOUT_SECONDS:-120}
      LLM_MAX_RETRIES: ${AILY_DOCKER_LLM_MAX_RETRIES:-2}
      LLM_MIN_INTERVAL_SECONDS: ${AILY_DOCKER_LLM_MIN_INTERVAL_SECONDS:-6}
      LLM_TRACE_LOG_PATH: ${AILY_DOCKER_LLM_TRACE_LOG_PATH:-/data/llm-calls.jsonl}
      DIKIWI_INCREMENTAL_TRIGGER_RATIO: ${AILY_DOCKER_DIKIWI_INCREMENTAL_TRIGGER_RATIO:-0.05}
      DIKIWI_NETWORK_MIN_NODES: ${AILY_DOCKER_DIKIWI_NETWORK_MIN_NODES:-3}
      DIKIWI_NETWORK_TRIGGER_SCORE: ${AILY_DOCKER_DIKIWI_NETWORK_TRIGGER_SCORE:-4.0}
      DIKIWI_NETWORK_MAX_CANDIDATE_NODES: ${AILY_DOCKER_DIKIWI_NETWORK_MAX_CANDIDATE_NODES:-18}
      DIKIWI_HIGHER_ORDER_MAX_CONTEXTS: ${AILY_DOCKER_DIKIWI_HIGHER_ORDER_MAX_CONTEXTS:-3}
      DIKIWI_BATCH_STAGE_CONCURRENCY: ${AILY_DOCKER_DIKIWI_BATCH_STAGE_CONCURRENCY:-4}
      DIKIWI_STAGE_TIMEOUT_SECONDS: ${AILY_DOCKER_DIKIWI_STAGE_TIMEOUT_SECONDS:-600}
      REACTOR_METHOD_TIMEOUT_SECONDS: ${AILY_DOCKER_REACTOR_METHOD_TIMEOUT_SECONDS:-120}
      ENTREPRENEUR_EVALUATION_TIMEOUT_MINUTES: ${AILY_DOCKER_ENTREPRENEUR_EVALUATION_TIMEOUT_MINUTES:-3}
      AILY_PROPOSAL_MAX_PER_SESSION: ${AILY_DOCKER_PROPOSAL_MAX_PER_SESSION:-4}
      MAX_FILE_SIZE: ${AILY_DOCKER_MAX_FILE_SIZE:-52428800}
    volumes:
      - ${AILY_DOCKER_DATA_DIR:-./.docker-data/data}:/data
      - ${AILY_DOCKER_VAULT_DIR:-./.docker-data/vault}:/vault
      - ${AILY_DOCKER_CHAOS_DIR:-./.docker-data/chaos}:/chaos
      - ${AILY_DOCKER_CHAOS_DIR:-./.docker-data/chaos}:/root/aily_chaos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
